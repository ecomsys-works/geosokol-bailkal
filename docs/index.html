<!doctype html>
<html lang="ru" xmlns="http://www.w3.org/1999/xhtml">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width,initial-scale=1">

    <script>
        (function normalizeDPR() {
            const meta = document.querySelector('meta[name="viewport"]');
            if (!meta) return;

            const dpr = window.devicePixelRatio || 1;

            // вычисляем scale и округляем до 2 знаков для красоты
            const scale = +(1 / dpr).toFixed(2);

            meta.setAttribute("content", `width=device-width, initial-scale=${scale}, maximum-scale=1, user-scalable=yes`);

            // Для отладки: покажет, какой scale выставился
            console.log("normalizeDPR applied:", {
                dpr,
                scale
            });
        })();
    </script>
    <title>Главная</title>
    <link rel="icon" href="favicon.ico" type="image/x-icon">

    <link rel="stylesheet" href="./css/main.min.css">
</head>


<body>
    <div class="wrapper">
        <header class="header">
            <div class="container">
                <a href="#" class="logo">
                    <img src="./images/webp/bailkal.webp" alt="Логотип Байкал">
                </a>
            </div>
        </header>

        <main class="main">
            <div class="container main__content">
                <h1 class="main__title">Байкал Маркет</h1>
                <h2 class="main__description">
                    <span class="main__white">Мы знаем </span>
                    <span class="main__white">о комплектующих</span>
                    <span class="main__accent">БПЛА РЭР РЭБ всё!</span>
                </h2>
                <a href="#" class="main__btn">
                    <img src="./images/webp/telegram.webp" alt="Telegram">
                    <span>Перейти в магазин</span>
                </a>
            </div>
        </main>
    </div>
    <script src="./js/main.min.js"></script>

</body>

</html>
